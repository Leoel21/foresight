<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foresight — Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .profile-layout {
      max-width: 860px; margin: 0 auto; padding: 36px 24px;
    }

    /* HERO */
    .profile-hero {
      display: flex; align-items: flex-start;
      gap: 24px; margin-bottom: 36px;
    }
    .profile-avatar-lg {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800;
    }
    .profile-info { flex: 1; }
    .profile-username { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
    .profile-wallet  { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .profile-badges  { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      letter-spacing: 0.04em;
    }
    .badge-gold    { background: rgba(232,197,71,0.1); color: var(--accent); border: 1px solid rgba(232,197,71,0.25); }
    .badge-teal    { background: rgba(62,207,178,0.1); color: var(--teal);   border: 1px solid rgba(62,207,178,0.25); }
    .badge-purple  { background: rgba(155,127,244,0.1); color: var(--purple); border: 1px solid rgba(155,127,244,0.25); }

    /* STAT GRID GRANDE */
    .big-stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-bottom: 36px;
    }
    .big-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      transition: border-color 0.15s;
    }
    .big-stat:hover { border-color: var(--border2); }
    .big-stat-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .big-stat-value { font-family: var(--mono); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .big-stat-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

    /* SECCIONES */
    .section { margin-bottom: 32px; }
    .section-head {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }

    /* Reputación por categoría */
    .rep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rep-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px;
    }
    .rep-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .rep-cat { font-size: 13px; font-weight: 700; }
    .rep-accuracy { font-family: var(--mono); font-size: 20px; font-weight: 700; }
    .rep-bar-bg { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .rep-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
    .rep-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    /* Historial de predicciones */
    .history-item {
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 16px; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }
    .history-q { font-size: 13px; font-weight: 500; line-height: 1.4; }
    .history-cat { font-size: 10px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }
    .history-result {
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      text-align: right; white-space: nowrap;
    }
    .history-pnl { font-family: var(--mono); font-size: 13px; font-weight: 700; text-align: right; white-space: nowrap; }
    .pnl-pos { color: var(--teal); }
    .pnl-neg { color: var(--coral); }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="profile-layout">

    <!-- HERO -->
    <div class="profile-hero fade-up">
      <div class="profile-avatar-lg">${''}</div>
      <div class="profile-info">
        <div class="profile-username" id="profile-username"></div>
        <div class="profile-wallet">0x4f2a...c91b · <span class="accent">Ver en explorador →</span></div>
        <div class="profile-badges" id="profile-badges"></div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px">Balance</div>
        <div style="font-family:var(--mono);font-size:22px;font-weight:700" id="profile-balance"></div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">USDC</div>
      </div>
    </div>

    <!-- BIG STATS -->
    <div class="big-stat-grid fade-up-1" id="big-stats"></div>

    <!-- REPUTACIÓN POR CATEGORÍA -->
    <div class="section fade-up-2">
      <div class="section-head">Reputación onchain por categoría</div>
      <div class="rep-grid" id="rep-grid"></div>
    </div>

    <!-- HISTORIAL -->
    <div class="section fade-up-3">
      <div class="section-head">Historial de predicciones</div>
      <div id="history-list"></div>
    </div>

  </div>

<script src="js/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
  <script src="js/contract.js"></script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/mobile.js"></script>
  <script src="js/wallet.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNav('profile');
      renderBottomNav('profile');

      const userId = localStorage.getItem('foresight_user_id');
      const walletAddr = localStorage.getItem('foresight_wallet_address');

      if (!userId) {
        document.querySelector('.profile-avatar-lg').textContent = '??';
        return;
      }

      try {
        const [userRes, statsRes, predsRes] = await Promise.all([
          fetch(`${BASE_URL}/users/${userId}`),
          fetch(`${BASE_URL}/users/${userId}/stats`),
          fetch(`${BASE_URL}/predictions/user/${userId}`),
        ]);

        const user  = await userRes.json();
        const stats = await statsRes.json();
        const preds = await predsRes.json();

        let balance = 0;
        try {
          if (walletAddr && typeof getUSDTBalance === 'function') {
            balance = await getUSDTBalance(walletAddr);
          }
        } catch(e) {}

        document.querySelector('.profile-avatar-lg').textContent = (user.username || 'U').slice(0,2).toUpperCase();
        document.getElementById('profile-username').textContent  = user.username || 'Usuario';
        document.getElementById('profile-balance').textContent   = parseFloat(balance).toFixed(2);
        document.getElementById('profile-badges').innerHTML = `
          <span class="badge badge-gold">◆ Liga ${user.league || 'Bronce'}</span>
          <span class="badge badge-teal">🔥 Racha ${user.streak || 0}d</span>
        `;

        document.getElementById('big-stats').innerHTML = `
          <div class="big-stat">
            <div class="big-stat-label">Precisión global</div>
            <div class="big-stat-value">${stats.accuracy || 0}<span style="font-size:14px;color:var(--muted)">%</span></div>
          </div>
          <div class="big-stat">
            <div class="big-stat-label">XP total</div>
            <div class="big-stat-value">${user.xp >= 1000 ? (user.xp/1000).toFixed(1)+'k' : user.xp || 0}</div>
          </div>
          <div class="big-stat">
            <div class="big-stat-label">Predicciones</div>
            <div class="big-stat-value">${stats.totalPredictions || 0}</div>
          </div>
          <div class="big-stat ${parseFloat(stats.totalPnl) >= 0 ? 'stat-up' : 'stat-down'}">
            <div class="big-stat-label">P&L total</div>
            <div class="big-stat-value">${parseFloat(stats.totalPnl || 0).toFixed(2)}</div>
            <div class="big-stat-sub muted">USDT</div>
          </div>
        `;

        const catStats = stats.categoryStats || [];
        document.getElementById('rep-grid').innerHTML = catStats.length
          ? catStats.map(c => `
            <div class="rep-card">
              <div class="rep-cat">${c.category}</div>
              <div class="rep-accuracy">${c.accuracy}%</div>
              <div class="rep-meta">${c.predictions} predicciones</div>
            </div>`).join('')
          : '<div style="color:var(--muted);font-size:13px">Sin predicciones todavía</div>';

        document.getElementById('history-list').innerHTML = Array.isArray(preds) && preds.length
          ? preds.map(p => {
              const won = p.correct === true;
              const lost = p.correct === false;
              const dotColor = won ? 'var(--teal)' : lost ? 'var(--coral)' : 'var(--accent)';
              const label = won ? 'Acertaste' : lost ? 'Fallaste' : 'Pendiente';
              const pnl = won
                ? `<span style="color:var(--teal)">+${parseFloat(p.payout||0).toFixed(2)} USDT</span>`
                : lost
                ? `<span style="color:var(--coral)">-${parseFloat(p.amount).toFixed(2)} USDT</span>`
                : `<span style="color:var(--accent)">${parseFloat(p.amount).toFixed(2)} USDT apostado</span>`;
              const q = p.markets?.question || 'Mercado';
              return `
                <div class="history-item">
                  <div class="h-dot" style="background:${dotColor}"></div>
                  <div class="h-body">
                    <div class="h-question">${q.slice(0,60)}${q.length>60?'...':''}</div>
                    <div class="h-meta">
                      <span class="badge ${won?'badge-teal':lost?'badge-coral':'badge-gold'}">${label}</span>
                      <span style="font-family:var(--mono);font-size:12px">${p.side==='yes'?'SÍ':'NO'}</span>
                      ${pnl}
                    </div>
                  </div>
                </div>`;
            }).join('')
          : '<div style="color:var(--muted);font-size:13px;padding:8px 0">Sin predicciones todavía</div>';

      } catch(e) {
        console.error('Error cargando perfil:', e);
      }
    });
  </script>
</body>
</html>
